name: Arc Raiders
description: Arc Raiders é um shooter cooperativo de extração em terceira pessoa ambientado num mundo pós-apocalíptico dominado por máquinas, onde os jogadores tornam-se Raiders, coletando recursos enquanto combatem as mortíferas máquinas ARC. O jogo enfatiza trabalho em equipe, posicionamento, gestão de recursos e decisões de risco-recompensa em cada jogo.
details:
  - PvE cooperativo em equipe com encontros de alta tensão.
  - Loop de extração focado em saque, sobrevivência e progressão.
  - Diversas opções de classe e equipamento para jogo tático em equipe.
  - Progressão persistente que recompensa o planejamento e a consistência.