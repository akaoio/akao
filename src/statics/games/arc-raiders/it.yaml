name: Arc Raiders
description: Arc Raiders è uno sparatutto cooperativo di estrazione in terza persona ambientato in un mondo post-apocalittico dominato dalle macchine, dove i giocatori diventano Raider, raccogliendo risorse mentre combattono contro le letali macchine ARC. Il gioco pone l'accento sul lavoro di squadra, il posizionamento, la gestione delle risorse e le decisioni rischio-ricompensa in ogni incursione.
details:
  - PvE cooperativo a squadra con scontri ad alta tensione.
  - Loop di estrazione incentrato su bottino, sopravvivenza e progressione.
  - Diverse scelte di classe e loadout per un gioco di squadra tattico.
  - Progressione persistente che premia la pianificazione e la costanza.