name: Arc Raiders
description: Arc Raiders एक सहकारी तृतीय-पक्ष निष्कर्षण शूटर है जो एक पोस्ट-एपोकैलिप्टिक दुनिया में स्थापित है जहाँ मशीनें शासन करती हैं। खिलाड़ी रेडर्स बनते हैं जो घातक ARC मशीनों से लड़ते हुए संसाधन इकट्ठा करते हैं। खेल में टीम वर्क, पोजिशनिंग, संसाधन प्रबंधन और हर रन में जोखिम-इनाम के फैसलों पर जोर दिया जाता है।
details:
  - उच्च तनाव वाली मुठभेड़ों के साथ दस्ते-आधारित सहकारी PvE।
  - लूट, जीवित रहने और प्रगति पर केंद्रित निष्कर्षण-शैली का गेम लूप।
  - सामरिक टीम खेल के लिए विभिन्न क्लास और लोडआउट विकल्प।
  - स्थायी प्रगति प्रणाली जो योजना और निरंतरता को पुरस्कृत करती है।