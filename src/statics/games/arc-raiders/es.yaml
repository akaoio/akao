name: Arc Raiders
description: Arc Raiders es un shooter cooperativo de extracción en tercera persona ambientado en un mundo postapocalíptico dominado por máquinas, donde los jugadores se convierten en Raiders que saquean recursos mientras combaten contra letales máquinas ARC. El juego pone énfasis en el trabajo en equipo, el posicionamiento, la gestión de recursos y las decisiones de riesgo-recompensa en cada incursión.
details:
  - PvE cooperativo en equipo con encuentros de alta tensión.
  - Bucle de extracción enfocado en botín, supervivencia y progresión.
  - Diversas opciones de clase y equipamiento para un juego táctico en equipo.
  - Progresión persistente que recompensa la planificación y la consistencia.