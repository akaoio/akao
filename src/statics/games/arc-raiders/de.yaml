name: Arc Raiders
description: Arc Raiders ist ein kooperativer Extraction-Shooter in der dritten Person, der in einer postapokalyptischen, von Maschinen beherrschten Welt spielt. Die Spieler schlüpfen in die Rolle von Raidern, die Ressourcen sammeln und dabei gegen tödliche ARC-Maschinen kämpfen. Das Spiel legt Wert auf Teamarbeit, Positionierung, Ressourcenmanagement und Risiko-Ertrags-Entscheidungen in jedem Einsatz.
details:
  - Teambasiertes kooperatives PvE mit hochintensiven Begegnungen.
  - Extraction-Loop mit Fokus auf Beute, Überleben und Progression.
  - Vielfältige Klassen- und Ausrüstungsoptionen für taktisches Teamspiel.
  - Persistente Progression, die Planung und Beständigkeit belohnt.