description: Arc Raiders là game bắn súng hợp tác góc nhìn thứ ba theo thể loại rút lui sinh tồn, diễn ra trong một thế giới hậu tận thế bị các cỗ máy thống trị. Người chơi trở thành những Raider, thu thập tài nguyên trong khi chiến đấu với những cỗ máy ARC nguy hiểm. Trò chơi nhấn mạnh tinh thần đồng đội, vị trí chiến thuật, quản lý kinh tế và các quyết định rủi ro-phần thưởng trong mỗi lần chơi.
details:
  - PvE hợp tác theo đội với các cuộc chạm trán căng thẳng.
  - Vòng lặp rút lui tập trung vào chiến lợi phẩm, sinh tồn và phát triển.
  - Lựa chọn lớp nhân vật và trang bị đa dạng cho lối chơi chiến thuật nhóm.
  - Hệ thống tiến độ bền vững, thưởng cho người chơi có chiến lược và kiên trì.