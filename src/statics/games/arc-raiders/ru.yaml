name: Arc Raiders
description: Arc Raiders — кооперативный экшн-шутер с видом от третьего лица в жанре extraction, действие которого разворачивается в постапокалиптическом мире, захваченном машинами. Игроки выступают в роли Рейдеров: собирают ресурсы, сражаясь с опасными машинами ARC. Игра акцентирует внимание на командной работе, позиционировании, управлении ресурсами и принятии решений в каждом забеге.
details:
  - Командный кооперативный PvE с напряжёнными столкновениями.
  - Игровой цикл extraction с фокусом на лут, выживание и развитие.
  - Разнообразие классов и снаряжения для тактической командной игры.
  - Система прогрессии, вознаграждающая вдумчивую игру и постоянство.