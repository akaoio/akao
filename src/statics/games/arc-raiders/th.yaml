description: Arc Raiders คือเกมยิงปืนสหกรณ์แบบมุมมองบุคคลที่สามประเภทเอ็กซ์แทร็กชัน ตั้งอยู่ในโลกหลังหายนะที่ถูกเครื่องจักรครอบงำ ผู้เล่นจะกลายเป็นผู้บุกโจมตีที่เก็บทรัพยากรขณะต่อสู้กับเครื่องจักร ARC ที่อันตราย เกมเน้นการทำงานเป็นทีม การวางตำแหน่ง การจัดการทรัพยากร และการตัดสินใจความเสี่ยง-ผลตอบแทนในแต่ละรอบ
details:
  - PvE แบบสหกรณ์เป็นหมู่กับการเผชิญหน้าที่ตึงเครียด
  - วงจรการเอ็กซ์แทร็กชันที่เน้นการเก็บของ การอยู่รอด และการพัฒนา
  - ตัวเลือกคลาสและอุปกรณ์ที่หลากหลายสำหรับการเล่นทีมเชิงยุทธ์
  - ระบบความก้าวหน้าถาวรที่ให้รางวัลกับการวางแผนและความสม่ำเสมอ