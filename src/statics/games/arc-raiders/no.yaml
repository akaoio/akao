name: Arc Raiders
description: Arc Raiders er et kooperativt tredjedspersons-ekstraksjonsskytespill satt i en postapokalyptisk verden styrt av maskiner, der spillerne blir Raidere som samler ressurser mens de kjemper mot dødelige ARC-maskiner. Spillet vektlegger teamarbeid, posisjonering, ressursstyring og risiko-belønningsbeslutninger i hvert løp.
details:
  - Lagbasert kooperativ PvE med høyspenningsoppdrag.
  - Ekstraksjonssløyfe med fokus på bytte, overlevelse og progresjon.
  - Varierte klasse- og utstyrsvalg for taktisk lagspill.
  - Vedvarende progresjonssystem som belønner planlegging og konsistens.