name: Arc Raiders
description: 《Arc Raiders》는 기계가 지배하는 포스트 아포칼립스 세계를 배경으로 한 협동 3인칭 탈출 슈터입니다. 플레이어는 레이더가 되어 치명적인 ARC 기계들과 싸우면서 자원을 수집합니다. 팀워크, 포지셔닝, 자원 관리, 그리고 각 판마다의 위험-보상 결정이 핵심입니다.
details:
  - 긴장감 넘치는 전투가 특징인 분대 기반 협동 PvE.
  - 전리품, 생존, 성장에 집중한 탈출형 게임 루프.
  - 다양한 클래스와 로드아웃 선택을 통한 전술적 팀 플레이.
  - 계획성과 꾸준함을 보상하는 지속적인 성장 시스템.