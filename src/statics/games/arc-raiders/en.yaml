description: Arc Raiders is a cooperative third-person extraction shooter set in a post-apocalyptic world where players become Raiders, scavenging resources while fighting deadly ARC machines. Gameplay emphasizes teamwork, positioning, economy management, and risk-reward decisions in each run.
details:
  - Squad-based cooperative PvE with high tension encounters.
  - Extraction-style loop focused on loot, survival, and progression.
  - Distinct class/loadout choices and tactical team play.
  - Persistent progression that rewards planning and consistency.