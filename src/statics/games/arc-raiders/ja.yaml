name: Arc Raiders
description: 『Arc Raiders』は、機械に支配されたポストアポカリプスの世界を舞台にした協力型三人称視点エクストラクションシューターです。プレイヤーはレイダーとなり、致命的なARCマシンと戦いながら資源を収集します。チームワーク、ポジショニング、経済管理、そして各ランでのリスクとリターンの判断が重要です。
details:
  - 高緊張な戦闘が特徴のスクワッドベース協力PvE。
  - 戦利品・生存・進行に焦点を当てたエクストラクション型ゲームループ。
  - 多彩なクラスとロードアウトによる戦術的チームプレイ。
  - 計画性と安定したプレイを報いる持続的な成長システム。