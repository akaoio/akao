name: Arc Raiders
description: Arc Raiders הוא משחק יריות שיתופי מגוף שלישי בז'אנר ה-Extraction, המתרחש בעולם פוסט-אפוקליפטי השולט בו מכונות. השחקנים הופכים ל-Raiders, אוספים משאבים תוך כדי מאבק במכונות ה-ARC הקטלניות. המשחק שם דגש על עבודת צוות, מיקום, ניהול משאבים והחלטות סיכון-תגמול בכל ריצה.
details:
  - PvE שיתופי מבוסס כיתה עם עימותים בעצימות גבוהה.
  - לולאת משחק מסוג Extraction המתמקדת בשלל, הישרדות והתקדמות.
  - בחירות מגוונות של מחלקה וציוד למשחק קבוצתי טקטי.
  - מערכת התקדמות מתמשכת המתגמלת תכנון ועקביות.