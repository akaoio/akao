name: Arc Raiders
description: Arc Raiders ایک تعاون پر مبنی تیسرے شخص کا ایکسٹریکشن شوٹر گیم ہے جو مشینوں کے زیر تسلط پوسٹ-اپوکیلپٹک دنیا میں قائم ہے، جہاں کھلاڑی ریڈرز بن کر مہلک ARC مشینوں سے لڑتے ہوئے وسائل جمع کرتے ہیں۔ گیم میں ٹیم ورک، پوزیشننگ، وسائل کا انتظام اور ہر دور میں خطرہ-انعام کے فیصلوں پر زور دیا جاتا ہے۔
details:
  - اعلیٰ تناؤ والے مقابلوں کے ساتھ دستہ-بنیاد تعاون PvE۔
  - لوٹ، بقا اور ترقی پر مرکوز ایکسٹریکشن طرز کا گیم لوپ۔
  - حکمت عملی پر مبنی ٹیم پلے کے لیے متنوع کلاس اور لوڈآؤٹ انتخاب۔
  - مستقل ترقی کا نظام جو منصوبہ بندی اور تسلسل کو انعام دیتا ہے۔