description: Arc Raiders هي لعبة تصويب تعاونية من منظور الشخص الثالث تدور أحداثها في عالم ما بعد الكارثة تسيطر عليه الآلات، حيث يتحول اللاعبون إلى غزاة يجمعون الموارد بينما يواجهون آلات ARC الفتاكة. تركز اللعبة على العمل الجماعي وإدارة الموارد والقرارات المحسوبة في كل جولة.
details:
  - لعب تعاوني قائم على الفريق مع مواجهات عالية التوتر.
  - حلقة لعب استخلاصية تركز على النهب والبقاء والتطور.
  - خيارات متنوعة للفصائل والتجهيزات لأسلوب لعب تكتيكي جماعي.
  - نظام تقدم مستمر يكافئ التخطيط والثبات.