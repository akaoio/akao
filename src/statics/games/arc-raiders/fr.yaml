name: Arc Raiders
description: Arc Raiders est un jeu de tir coopératif d'extraction à la troisième personne se déroulant dans un monde post-apocalyptique dominé par les machines. Les joueurs incarnent des Raiders, récupérant des ressources tout en combattant les mortelles machines ARC. Le jeu met l'accent sur le travail d'équipe, le positionnement, la gestion de l'économie et les décisions risque-récompense à chaque incursion.
details:
  - PvE coopératif en escouade avec des affrontements à haute tension.
  - Boucle de jeu d'extraction axée sur le butin, la survie et la progression.
  - Choix de classes et d'équipement variés pour un jeu d'équipe tactique.
  - Progression persistante récompensant la planification et la régularité.