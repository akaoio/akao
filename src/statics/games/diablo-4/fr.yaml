description: Diablo IV est un dungeon crawler de rôle et d'action se déroulant dans le monde obscur de Sanctuaire. Les joueurs créent des personnages uniques, éliminent des donjons difficiles, collectent du butin puissant et progressent dans le contenu saisonnier, aussi bien en solo qu'en multijoueur.
details:
  - Construction de personnages approfondie avec des arbres de compétences et des synergies d'objets.
  - Progression axée sur les donjons avec des défis en fin de partie évolutifs.
  - Boucle de jeu pilotée par le butin avec des améliorations et de l'artisanat fréquents.
  - Prend en charge le PvE coopératif et les zones PvP dédiées.