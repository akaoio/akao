description: Diablo IV è un dungeon crawler di ruolo e azione ambientato nel mondo oscuro di Sanctuarium. I giocatori creano personaggi unici, affrontano dungeon impegnativi, raccolgono bottino potente e avanzano nei contenuti stagionali sia in modalità singola che multiplayer.
details:
  - Build di personaggio approfondite con alberi delle abilità e sinergie tra oggetti.
  - Progressione incentrata sui dungeon con sfide di endgame scalabili.
  - Loop di gioco guidato dal bottino con aggiornamenti e craft frequenti.
  - Supporta PvE cooperativo e zone PvP dedicate.