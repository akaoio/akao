description: Diablo IV là game nhập vai hành động theo thể loại khám phá hầm ngục diễn ra trong thế giới tối tăm của Thánh Địa. Người chơi xây dựng nhân vật độc đáo, chinh phục các hầm ngục đầy thử thách, thu thập trang bị mạnh mẽ và tiến qua nội dung theo mùa trong cả chế độ một người và nhiều người chơi.
details:
  - Xây dựng nhân vật chuyên sâu với cây kỹ năng và sự kết hợp trang bị.
  - Phát triển tập trung vào hầm ngục với thử thách cuối game có thể điều chỉnh.
  - Vòng lặp gameplay hướng đến chiến lợi phẩm với nâng cấp và chế tạo thường xuyên.
  - Hỗ trợ cả PvE hợp tác và khu vực PvP chuyên dùng.