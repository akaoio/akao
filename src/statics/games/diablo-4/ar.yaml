name: Diablo IV
description: Diablo IV لعبة قتال ومغامرة من دور الأبطال تدور في عالم المأوى المظلم. يبني اللاعبون شخصيات فريدة ويجتازون الزنازين الصعبة ويجمعون الغنائم القوية ويتقدمون عبر محتوى الموسم، سواء بمفردهم أو في وضع متعدد اللاعبين.
details:
  - بناء شخصيات عميق مع أشجار المهارات وتآزر العناصر.
  - تقدم يركز على الزنازين مع تحديات نهاية اللعبة القابلة للتوسع.
  - حلقة لعب مدفوعة بالغنائم مع ترقيات وصناعة متكررة.
  - يدعم PvE التعاوني ومناطق PvP المخصصة.