description: Diablo IV הוא dungeon crawler בז'אנר RPG אקשן, המתרחש בעולמו האפל של מקלט. השחקנים בונים דמויות ייחודיות, מנקים מבוכים מאתגרים, אוספים ביזה עוצמתית ומתקדמים דרך תוכן עונתי הן במצב יחיד והן במרובה משתתפים.
details:
  - בניית דמות מעמיקה עם עצי מיומנויות וסינרגיות פריטים.
  - התקדמות ממוקדת מבוכים עם אתגרי endgame ניתנים להרחבה.
  - לולאת משחק מונעת ביזה עם שדרוגים ויצירה תכופים.
  - תומך ב-PvE שיתופי ואזורי PvP ייעודיים.