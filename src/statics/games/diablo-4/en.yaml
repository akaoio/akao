description: Diablo IV is an action role-playing dungeon crawler set in the dark world of Sanctuary. Players build unique characters, clear challenging dungeons, collect powerful loot, and progress through seasonal content with both solo and multiplayer options.
details:
  - Deep character builds with skill trees and item synergies.
  - Dungeon-focused progression with scalable endgame challenges.
  - Loot-driven gameplay loop with frequent upgrades and crafting.
  - Supports both cooperative PvE and dedicated PvP zones.