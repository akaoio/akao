description: Diablo IV — экшн-ролевая игра в жанре dungeon crawler, действие которой разворачивается в тёмном мире Убежища. Игроки создают уникальных персонажей, зачищают сложные подземелья, собирают мощный лут и продвигаются через сезонный контент как в одиночном, так и в многопользовательском режиме.
details:
  - Глубокая прокачка персонажа с древом умений и синергией предметов.
  - Ориентированный на подземелья прогресс с масштабируемыми испытаниями в позднем игре.
  - Игровой цикл, движимый лутом, с частыми улучшениями и крафтом.
  - Поддержка кооперативного PvE и выделенных PvP-зон.