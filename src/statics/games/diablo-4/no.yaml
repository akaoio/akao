name: Diablo IV
description: Diablo IV er et action-rollespill og dungeon crawler satt i den mørke verdenen Sanktuarium. Spillere bygger unike karakterer, rydder utfordrende fangehull, samler kraftig bytte og fremskrider gjennom sesonginnhold med både solo- og flerspilleralternativer.
details:
  - Dype karakterbygg med ferdighetstrær og gjenstandssynergier.
  - Fangehullfokusert progresjon med skalerbare endgame-utfordringer.
  - Byttebasert spillesløyfe med hyppige oppgraderinger og håndverk.
  - Støtter kooperativ PvE og dedikerte PvP-soner.