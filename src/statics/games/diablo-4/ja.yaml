name: ディアブロ IV

description: 『ディアブロ IV』は、暗黒の世界サンクチュアリを舞台にしたアクションRPGダンジョン探索ゲームです。プレイヤーはユニークなキャラクターを構築し、難関ダンジョンをクリアし、強力な装備を集め、ソロとマルチプレイヤーの両方で季節コンテンツを進めることができます。
details:
  - スキルツリーとアイテムシナジーを活かした奥深いキャラクタービルド。
  - ダンジョン中心の進行とスケーラブルなエンドゲームコンテンツ。
  - 頻繁なアップグレードとクラフトを伴うルート駆動のゲームループ。
  - 協力型PvEと専用PvPゾーンの両方に対応。