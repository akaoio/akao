name: 디아블로 IV

description: 《디아블로 IV》는 어두운 세계 성역을 배경으로 한 액션 RPG 던전 크롤러입니다. 플레이어는 고유한 캐릭터를 구성하고, 도전적인 던전을 공략하며, 강력한 아이템을 수집하고, 솔로와 멀티플레이어 모두에서 시즌 콘텐츠를 통해 성장합니다.
details:
  - 스킬 트리와 아이템 시너지를 갖춘 심층 캐릭터 빌드.
  - 확장 가능한 엔드게임 콘텐츠를 갖춘 던전 중심 성장.
  - 빈번한 업그레이드와 제작이 포함된 아이템 중심 게임 루프.
  - 협동 PvE와 전용 PvP 구역 모두 지원.