name: Diablo IV
description: Diablo IV एक एक्शन रोल-प्लेइंग डंजन क्रॉलर है जो अंधेरी दुनिया सैंक्चुअरी में स्थापित है। खिलाड़ी अनोखे किरदार बनाते हैं, चुनौतीपूर्ण डंजनों को साफ करते हैं, शक्तिशाली लूट इकट्ठा करते हैं और सिंगल तथा मल्टीप्लेयर दोनों विकल्पों के साथ सीजनल कंटेंट में आगे बढ़ते हैं।
details:
  - स्किल ट्री और आइटम सिनर्जी के साथ गहरा कैरेक्टर बिल्ड।
  - स्केलेबल एंडगेम चुनौतियों के साथ डंजन-केंद्रित प्रगति।
  - बार-बार अपग्रेड और क्राफ्टिंग के साथ लूट-संचालित गेमप्ले लूप।
  - सहकारी PvE और समर्पित PvP क्षेत्रों दोनों का समर्थन करता है।