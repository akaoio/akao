description: Diablo IV ist ein Action-Rollenspiel und Dungeon-Crawler, der in der düsteren Welt von Sanktuario spielt. Spieler erschaffen einzigartige Charaktere, bezwingen herausfordernde Dungeons, sammeln mächtiges Loot und schreiten durch saisonale Inhalte voran – sowohl solo als auch im Multiplayer.
details:
  - Tiefes Charakterbuilding mit Skillbäumen und Gegenstandssynergien.
  - Dungeonbasierte Progression mit skalierbaren Endgame-Herausforderungen.
  - Lootgetriebener Spielkreislauf mit häufigen Upgrades und Crafting.
  - Unterstützt kooperatives PvE und dedizierte PvP-Zonen.