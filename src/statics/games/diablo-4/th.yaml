name: Diablo IV
description: Diablo IV คือเกม dungeon crawler แนว action RPG ที่ตั้งอยู่ในโลกมืดมนของ Sanctuary ผู้เล่นสร้างตัวละครที่เป็นเอกลักษณ์ ล้าง dungeon ที่ท้าทาย เก็บของรางวัลทรงพลัง และพัฒนาตัวละครผ่านเนื้อหาตามฤดูกาลทั้งในโหมดเดี่ยวและหลายผู้เล่น
details:
  - การสร้างตัวละครเชิงลึกด้วยต้นไม้ทักษะและการผสานของไอเทม
  - การพัฒนาที่เน้น dungeon พร้อมความท้าทายในช่วงท้ายเกมที่ปรับได้
  - วงจรการเล่นที่ขับเคลื่อนด้วยของรางวัล พร้อมการอัปเกรดและการสร้างบ่อยครั้ง
  - รองรับทั้ง PvE แบบสหกรณ์และโซน PvP เฉพาะ