description: Diablo IV é um dungeon crawler de RPG de ação ambientado no mundo sombrio de Santuário. Os jogadores criam personagens únicos, eliminam masmorras desafiadoras, coletam espólios poderosos e avançam no conteúdo sazonal tanto no modo solo quanto no multiplayer.
details:
  - Builds de personagem profundas com árvores de habilidades e sinergias de itens.
  - Progressão focada em masmorras com desafios de endgame escaláveis.
  - Loop de jogo impulsionado por espólios com atualizações e criação frequentes.
  - Suporta PvE cooperativo e zonas dedicadas de PvP.