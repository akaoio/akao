description: Diablo IV es un dungeon crawler de rol de acción ambientado en el oscuro mundo de Santuario. Los jugadores crean personajes únicos, superan mazmorras desafiantes, coleccionan botín poderoso y avanzan a través del contenido de temporada, tanto en solitario como en multijugador.
details:
  - Construcciones de personajes profundas con árboles de habilidades y sinergias de objetos.
  - Progresión enfocada en mazmorras con desafíos de endgame escalables.
  - Bucle de juego impulsado por el botín con frecuentes mejoras y fabricación.
  - Admite PvE cooperativo y zonas dedicadas de PvP.