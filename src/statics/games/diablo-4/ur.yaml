description: Diablo IV ایک ایکشن رول پلیئنگ ڈنجن کرالر گیم ہے جو سینکچوری کی تاریک دنیا میں قائم ہے۔ کھلاڑی منفرد کردار بناتے ہیں، مشکل ڈنجنوں کو صاف کرتے ہیں، طاقتور لوٹ جمع کرتے ہیں اور سنگل اور ملٹی پلیئر دونوں آپشنز کے ساتھ سیزنل مواد میں آگے بڑھتے ہیں۔
details:
  - سکل ٹری اور آئٹم سینرجی کے ساتھ گہری کردار سازی۔
  - قابل توسیع اینڈ گیم چیلنجز کے ساتھ ڈنجن مرکوز ترقی۔
  - بار بار اپ گریڈ اور کرافٹنگ کے ساتھ لوٹ سے چلنے والا گیم پلے لوپ۔
  - تعاون پر مبنی PvE اور مخصوص PvP زونز دونوں کی حمایت کرتا ہے۔